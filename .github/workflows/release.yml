name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  SPARKLE_VERSION: 2.9.1

jobs:
  release:
    name: Build, sign, notarize & publish
    runs-on: macos-15
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Swift version
        run: swift --version

      - name: Install Sparkle CLI tools
        run: |
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" -o "$RUNNER_TEMP/sparkle.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar -xf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"
          chmod +x "$RUNNER_TEMP/sparkle/bin/"*
          echo "$RUNNER_TEMP/sparkle/bin" >> "$GITHUB_PATH"

      - name: Import Developer ID code-signing certificate
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CERT_P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "::add-mask::$KEYCHAIN_PASSWORD"

          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          existing="$(security list-keychains -d user | tr -d '"' | xargs)"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $existing

          rm -f "$RUNNER_TEMP/cert.p12"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Resolve signing identity
        id: identity
        run: |
          identity=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | awk -F'"' '/Developer ID Application/ {print $2; exit}')
          if [[ -z "$identity" ]]; then
            echo "No 'Developer ID Application' identity found in the imported keychain."
            exit 1
          fi
          echo "identity=$identity" >> "$GITHUB_OUTPUT"

      - name: Build & sign CapNote.app
        env:
          CODESIGN_IDENTITY: ${{ steps.identity.outputs.identity }}
        run: |
          version="${TAG#v}"
          bin/make-app.sh "$version"

      - name: Notarize CapNote.app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          notarize_zip="$RUNNER_TEMP/CapNote-notarize.zip"
          ditto -c -k --keepParent dist/CapNote.app "$notarize_zip"

          xcrun notarytool submit "$notarize_zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --wait

          rm "$notarize_zip"

          xcrun stapler staple dist/CapNote.app
          xcrun stapler validate dist/CapNote.app

      - name: Stage release artifact
        id: stage
        run: |
          version="${TAG#v}"
          artifact="CapNote-${version}.zip"
          ditto -c -k --keepParent dist/CapNote.app "$artifact"
          shasum -a 256 "$artifact" > "${artifact}.sha256"
          echo "artifact=$artifact" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Sign update for Sparkle
        id: sparkle_sign
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          key_file="$RUNNER_TEMP/sparkle_ed_key"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$key_file"
          chmod 600 "$key_file"

          # sign_update prints e.g.:
          #   sparkle:edSignature="..." length="..."
          signature_line=$(sign_update -f "$key_file" "${{ steps.stage.outputs.artifact }}")
          rm -f "$key_file"

          # Persist as a single, multiline-safe output.
          {
            echo "signature_line<<__SPARKLE_EOF__"
            echo "$signature_line"
            echo "__SPARKLE_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG" \
            --title "CapNote $TAG" \
            --generate-notes \
            "${{ steps.stage.outputs.artifact }}" \
            "${{ steps.stage.outputs.artifact }}.sha256"

      - name: Update Sparkle appcast on gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIGNATURE_LINE: ${{ steps.sparkle_sign.outputs.signature_line }}
          ARTIFACT: ${{ steps.stage.outputs.artifact }}
          VERSION: ${{ steps.stage.outputs.version }}
        run: |
          repo_url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          download_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${ARTIFACT}"
          notes_url="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
          length=$(stat -f%z "$ARTIFACT")

          mkdir -p "$RUNNER_TEMP/pages"
          cd "$RUNNER_TEMP/pages"

          if git ls-remote --exit-code --heads "$repo_url" gh-pages >/dev/null 2>&1; then
              git clone --depth 1 --branch gh-pages "$repo_url" .
          else
              echo "gh-pages branch does not exist yet — initializing."
              git init -q -b gh-pages
              git remote add origin "$repo_url"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          python3 "$GITHUB_WORKSPACE/bin/update-appcast.py" \
            --appcast appcast.xml \
            --version "$VERSION" \
            --download-url "$download_url" \
            --length "$length" \
            --signature "$SIGNATURE_LINE" \
            --release-notes-url "$notes_url" \
            --min-system-version 14.0

          git add appcast.xml
          if git diff --cached --quiet; then
              echo "No appcast changes to commit."
          else
              git commit -m "Publish CapNote ${VERSION}"
              git push -u origin gh-pages
          fi

      - name: Clean up keychain
        if: always()
        run: |
          if [[ -n "${KEYCHAIN_PATH:-}" && -f "$KEYCHAIN_PATH" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
