name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: macos-15
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Swift version
        run: swift --version

      - name: Build CapNote.app
        run: |
          version="${TAG#v}"
          bin/make-app.sh "$version"

      - name: Stage release artifact
        run: |
          version="${TAG#v}"
          mkdir -p stage
          cp -R dist/CapNote.app stage/
          cd stage
          zip -ry "../CapNote-${version}.zip" CapNote.app
          cd ..
          shasum -a 256 "CapNote-${version}.zip" > "CapNote-${version}.zip.sha256"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${TAG#v}"
          gh release create "$TAG" \
            --title "CapNote $TAG" \
            --generate-notes \
            "CapNote-${version}.zip" \
            "CapNote-${version}.zip.sha256"
